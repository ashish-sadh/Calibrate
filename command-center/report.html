<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report — Drift Command Center</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h1><span>Drift</span> Command Center</h1>
    <div id="auth-area"></div>
  </div>

  <div class="content">
    <div class="report-header">
      <a href="index.html" class="back-link">< Back to reports</a>
      <div id="pr-link"></div>
    </div>

    <div id="report-body" class="loading"><span class="spinner"></span> Loading report...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const filename = params.get('file');
    let currentPR = null;
    let currentPath = `Docs/reports/${filename}`;
    let commentsByLine = {};

    async function loadReport() {
      if (!filename) {
        document.getElementById('report-body').innerHTML = '<div class="empty">No report specified.</div>';
        return;
      }

      try {
        // Load report content
        const content = await getReportContent(currentPath);
        const lines = content.split('\n');

        // Find associated PR
        currentPR = await findPRForReport(filename);
        if (currentPR) {
          document.getElementById('pr-link').innerHTML =
            `<a href="${currentPR.html_url}" target="_blank" class="btn">View on GitHub #${currentPR.number}</a>`;

          // Load existing comments
          const comments = await getPRComments(currentPR.number);
          comments.forEach(c => {
            const line = c.line || c.original_line || c.position;
            if (line) {
              if (!commentsByLine[line]) commentsByLine[line] = [];
              commentsByLine[line].push(c);
            }
          });
        }

        // Render report with clickable lines
        const rendered = renderReportWithLines(lines);
        document.getElementById('report-body').innerHTML = rendered;

      } catch (e) {
        document.getElementById('report-body').innerHTML =
          `<div class="empty">Failed to load report: ${e.message}${!getToken() ? ' (sign in first)' : ''}</div>`;
      }
    }

    function renderReportWithLines(lines) {
      let html = '<div class="report-content">';
      let inCodeBlock = false;

      lines.forEach((line, idx) => {
        const lineNum = idx + 1;
        const hasComments = commentsByLine[lineNum];
        const commentClass = hasComments ? ' has-comments' : '';
        const indicator = hasComments
          ? `<span class="line-comment-indicator">${hasComments.length} comment${hasComments.length > 1 ? 's' : ''}</span>`
          : '';

        // Track code blocks
        if (line.startsWith('```')) {
          inCodeBlock = !inCodeBlock;
          html += `<div class="report-line${commentClass}">${escapeHtml(line)}${indicator}</div>`;
        } else if (inCodeBlock) {
          html += `<div class="report-line${commentClass}" style="font-family:monospace;font-size:13px">${escapeHtml(line)}${indicator}</div>`;
        } else {
          // Render markdown for this line
          const rendered = renderMarkdown(line);
          html += `<div class="report-line${commentClass}" data-line="${lineNum}" onclick="toggleComment(${lineNum})">${rendered}${indicator}</div>`;
        }

        // Show existing comments
        if (hasComments) {
          html += hasComments.map(c => `
            <div class="existing-comment">
              <div class="comment-author">
                <img src="${c.user.avatar_url}" alt="${c.user.login}">
                <strong>${c.user.login}</strong>
                <time>${new Date(c.created_at).toLocaleDateString()}</time>
              </div>
              <div class="comment-body">${renderMarkdown(c.body)}</div>
            </div>
          `).join('');
        }

        // Comment box placeholder
        html += `<div id="comment-box-${lineNum}" style="display:none"></div>`;
      });

      html += '</div>';
      return html;
    }

    function toggleComment(lineNum) {
      const box = document.getElementById(`comment-box-${lineNum}`);
      if (box.style.display !== 'none') {
        box.style.display = 'none';
        box.innerHTML = '';
        return;
      }

      if (!getToken()) {
        alert('Sign in to comment');
        return;
      }

      if (!currentPR) {
        alert('No PR found for this report — comments require an associated PR');
        return;
      }

      box.style.display = 'block';
      box.innerHTML = `
        <div class="comment-box">
          <textarea id="comment-text-${lineNum}" placeholder="Add your feedback on this line..."></textarea>
          <div class="actions">
            <button class="btn" onclick="toggleComment(${lineNum})">Cancel</button>
            <button class="btn btn-primary" onclick="postComment(${lineNum})">Submit</button>
          </div>
        </div>
      `;
      document.getElementById(`comment-text-${lineNum}`).focus();
    }

    async function postComment(lineNum) {
      const text = document.getElementById(`comment-text-${lineNum}`).value.trim();
      if (!text) return;

      const btn = event.target;
      btn.textContent = 'Submitting...';
      btn.disabled = true;

      try {
        await submitComment(currentPR.number, currentPath, lineNum, text);
        // Reload to show the new comment
        location.reload();
      } catch (e) {
        alert(`Failed to submit: ${e.message}`);
        btn.textContent = 'Submit';
        btn.disabled = false;
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // Init
    showUser();
    loadReport();
  </script>
</body>
</html>
