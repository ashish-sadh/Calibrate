<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report — Drift Command Center</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .report-section {
      position: relative;
      padding: 12px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      margin: 2px 0;
    }
    .report-section:hover {
      background: rgba(88, 166, 255, 0.06);
    }
    .report-section:hover .comment-btn {
      opacity: 1;
    }
    .report-section.has-comments {
      background: rgba(88, 166, 255, 0.04);
      border-left: 3px solid var(--accent);
      padding-left: 13px;
    }
    .comment-btn {
      position: absolute;
      right: 8px;
      top: 8px;
      opacity: 0;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }
    .comment-btn:hover { background: var(--accent-hover); }
    .comment-count {
      display: inline-block;
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
      font-size: 12px;
      padding: 1px 8px;
      border-radius: 10px;
      margin-left: 8px;
    }

    /* Pretty markdown rendering */
    .report-rendered h1 { font-size: 28px; font-weight: 700; margin: 0 0 8px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .report-rendered h2 { font-size: 20px; font-weight: 600; color: var(--accent); margin: 32px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .report-rendered h3 { font-size: 16px; font-weight: 600; margin: 20px 0 8px; }
    .report-rendered p { margin: 8px 0; line-height: 1.7; }
    .report-rendered ul, .report-rendered ol { margin: 8px 0; padding-left: 24px; }
    .report-rendered li { margin: 4px 0; line-height: 1.6; }
    .report-rendered table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    .report-rendered th { background: var(--bg); font-weight: 600; text-align: left; padding: 10px 14px; border: 1px solid var(--border); font-size: 13px; text-transform: uppercase; letter-spacing: 0.3px; color: var(--text-muted); }
    .report-rendered td { padding: 10px 14px; border: 1px solid var(--border); }
    .report-rendered tr:hover td { background: rgba(88, 166, 255, 0.03); }
    .report-rendered code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .report-rendered pre { background: var(--bg); padding: 16px; border-radius: 8px; overflow-x: auto; margin: 12px 0; }
    .report-rendered pre code { padding: 0; background: none; }
    .report-rendered blockquote { border-left: 3px solid var(--accent); padding: 8px 16px; margin: 12px 0; color: var(--text-muted); background: rgba(88, 166, 255, 0.03); border-radius: 0 6px 6px 0; }
    .report-rendered strong { color: #fff; }
    .report-rendered hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
    .report-rendered a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>Drift</span> Command Center</h1>
    <div id="auth-area"></div>
  </div>

  <div class="content">
    <div class="report-header">
      <a href="index.html" class="back-link">&larr; Back to reports</a>
      <div id="pr-link"></div>
    </div>

    <div id="report-body" class="loading"><span class="spinner"></span> Loading report...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const filename = params.get('file');
    let currentPR = null;
    let currentPath = `Docs/reports/${filename}`;
    let commentsBySection = {};
    let rawLines = [];

    async function loadReport() {
      if (!filename) {
        document.getElementById('report-body').innerHTML = '<div class="empty">No report specified.</div>';
        return;
      }

      try {
        const content = await getReportContent(currentPath);
        rawLines = content.split('\n');

        // Find associated PR
        currentPR = await findPRForReport(filename);
        if (currentPR) {
          document.getElementById('pr-link').innerHTML =
            `<a href="${currentPR.html_url}" target="_blank" class="btn">View on GitHub #${currentPR.number}</a>`;

          // Load existing comments and map to sections
          const comments = await getPRComments(currentPR.number);
          comments.forEach(c => {
            const line = c.fileLine;
            if (line) {
              // Map line to section index
              const sectionIdx = lineToSection(line);
              if (!commentsBySection[sectionIdx]) commentsBySection[sectionIdx] = [];
              commentsBySection[sectionIdx].push(c);
            }
          });
        }

        renderReport(content);

      } catch (e) {
        document.getElementById('report-body').innerHTML =
          `<div class="empty">Failed to load report: ${e.message}${!getToken() ? ' (sign in first)' : ''}</div>`;
      }
    }

    // Split markdown into sections by headings and major blocks
    function splitIntoSections(content) {
      const lines = content.split('\n');
      const sections = [];
      let current = { startLine: 1, lines: [] };

      lines.forEach((line, idx) => {
        // Start new section on headings or horizontal rules
        if ((line.match(/^#{1,3}\s/) || line.match(/^---\s*$/)) && current.lines.length > 0) {
          sections.push(current);
          current = { startLine: idx + 1, lines: [] };
        }
        current.lines.push(line);
      });
      if (current.lines.length > 0) sections.push(current);
      return sections;
    }

    function lineToSection(lineNum) {
      const sections = splitIntoSections(rawLines.join('\n'));
      for (let i = 0; i < sections.length; i++) {
        const s = sections[i];
        const endLine = s.startLine + s.lines.length - 1;
        if (lineNum >= s.startLine && lineNum <= endLine) return i;
      }
      return 0;
    }

    function renderReport(content) {
      const sections = splitIntoSections(content);
      let html = '<div class="report-rendered">';

      sections.forEach((section, idx) => {
        const md = section.lines.join('\n');
        const rendered = marked.parse(md);
        const comments = commentsBySection[idx];
        const hasComments = comments && comments.length > 0;

        html += `<div class="report-section${hasComments ? ' has-comments' : ''}" data-section="${idx}" data-start-line="${section.startLine}">`;
        html += `<button class="comment-btn" onclick="event.stopPropagation();toggleComment(${idx}, ${section.startLine})" title="Add feedback">+</button>`;
        html += rendered;

        if (hasComments) {
          html += `<div style="margin-top:8px">`;
          comments.forEach(c => {
            html += `
              <div class="existing-comment">
                <div class="comment-author">
                  <img src="${c.user.avatar_url}" alt="${c.user.login}">
                  <strong>${c.user.login}</strong>
                  <time>${new Date(c.created_at).toLocaleDateString()}</time>
                </div>
                <div class="comment-body">${marked.parse(c.body)}</div>
              </div>`;
          });
          html += `</div>`;
        }

        html += `<div id="comment-box-${idx}" style="display:none"></div>`;
        html += `</div>`;
      });

      html += '</div>';
      document.getElementById('report-body').innerHTML = html;
    }

    function toggleComment(sectionIdx, startLine) {
      const box = document.getElementById(`comment-box-${sectionIdx}`);
      if (box.style.display !== 'none') {
        box.style.display = 'none';
        box.innerHTML = '';
        return;
      }

      if (!getToken()) { alert('Sign in to comment'); return; }
      if (!currentPR) { alert('No PR found for this report'); return; }

      box.style.display = 'block';
      box.innerHTML = `
        <div class="comment-box">
          <textarea id="comment-text-${sectionIdx}" placeholder="Your feedback on this section..."></textarea>
          <div class="actions">
            <button class="btn" onclick="toggleComment(${sectionIdx}, ${startLine})">Cancel</button>
            <button class="btn btn-primary" onclick="postComment(${sectionIdx}, ${startLine})">Submit Feedback</button>
          </div>
        </div>`;
      document.getElementById(`comment-text-${sectionIdx}`).focus();
    }

    async function postComment(sectionIdx, startLine) {
      const text = document.getElementById(`comment-text-${sectionIdx}`).value.trim();
      if (!text) return;

      const btn = event.target;
      btn.textContent = 'Submitting...';
      btn.disabled = true;

      try {
        await submitComment(currentPR.number, currentPath, startLine, text);
        location.reload();
      } catch (e) {
        alert(`Failed to submit: ${e.message}`);
        btn.textContent = 'Submit Feedback';
        btn.disabled = false;
      }
    }

    // Init
    showUser();
    loadReport();
  </script>
</body>
</html>
