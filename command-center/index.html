<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drift Command Center</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h1><span>Drift</span> Command Center</h1>
    <div id="auth-area"></div>
  </div>

  <div class="metrics" id="metrics">
    <div class="loading"><span class="spinner"></span> Loading metrics...</div>
  </div>

  <div class="content">
    <div class="tabs">
      <div class="tab active" data-tab="reports">Reports</div>
      <div class="tab" data-tab="bugs">File Bug</div>
      <div class="tab" data-tab="issues">Open Issues</div>
      <div class="tab" data-tab="feedback">Feedback Trail</div>
    </div>

    <div id="tab-reports">
      <div class="loading" id="reports-loading"><span class="spinner"></span> Loading reports...</div>
      <ul class="report-list" id="report-list"></ul>
    </div>

    <div id="tab-bugs" style="display:none">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px 40px;max-width:640px;margin:0 auto;">
        <h2 style="margin:0 0 20px;font-size:20px;">File a Bug</h2>
        <div style="margin-bottom:16px;">
          <label style="display:block;font-size:13px;color:var(--text-muted);margin-bottom:4px;">Title</label>
          <input id="bug-title" type="text" placeholder="e.g. Dashboard rings overlap on iPhone SE"
            style="width:100%;padding:10px 12px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:14px;">
        </div>
        <div style="margin-bottom:16px;">
          <label style="display:block;font-size:13px;color:var(--text-muted);margin-bottom:4px;">Description</label>
          <textarea id="bug-body" rows="5" placeholder="What happened? Steps to reproduce?"
            style="width:100%;padding:10px 12px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:14px;resize:vertical;font-family:inherit;"></textarea>
        </div>
        <div style="margin-bottom:16px;">
          <label style="display:block;font-size:13px;color:var(--text-muted);margin-bottom:4px;">Priority</label>
          <select id="bug-priority" style="padding:8px 12px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:14px;">
            <option value="">Select...</option>
            <option value="P0">P0 — Blocks users</option>
            <option value="P1">P1 — Annoying but usable</option>
            <option value="P2">P2 — Cosmetic</option>
          </select>
        </div>
        <div style="margin-bottom:20px;">
          <label style="display:block;font-size:13px;color:var(--text-muted);margin-bottom:4px;">Screenshot (optional)</label>
          <input id="bug-screenshot" type="file" accept="image/*"
            style="font-size:14px;color:var(--text-muted);">
          <div id="screenshot-preview" style="margin-top:8px;"></div>
        </div>
        <div style="display:flex;justify-content:flex-end;">
          <button class="btn btn-primary" onclick="submitBug()" id="bug-submit-btn">Submit Bug</button>
        </div>
        <div id="bug-result" style="margin-top:16px;"></div>
      </div>
    </div>

    <div id="tab-issues" style="display:none">
      <div id="issues-list">
        <div class="loading"><span class="spinner"></span> Loading issues...</div>
      </div>
    </div>

    <div id="tab-feedback" style="display:none">
      <div id="feedback-list">
        <div class="loading"><span class="spinner"></span> Loading feedback...</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
  <script>
    // Tabs
    const allTabs = ['reports', 'bugs', 'issues', 'feedback'];
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        allTabs.forEach(t => {
          const el = document.getElementById('tab-' + t);
          if (el) el.style.display = tab.dataset.tab === t ? '' : 'none';
        });
        if (tab.dataset.tab === 'feedback') loadFeedback();
        if (tab.dataset.tab === 'issues') loadIssues();
      });
    });

    // Screenshot preview
    document.getElementById('bug-screenshot').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('screenshot-preview').innerHTML =
          `<img src="${ev.target.result}" style="max-width:100%;max-height:300px;border-radius:8px;border:1px solid var(--border);margin-top:4px;">`;
      };
      reader.readAsDataURL(file);
    });

    // Submit bug
    async function submitBug() {
      const title = document.getElementById('bug-title').value.trim();
      const body = document.getElementById('bug-body').value.trim();
      const priority = document.getElementById('bug-priority').value;
      const fileInput = document.getElementById('bug-screenshot');
      const btn = document.getElementById('bug-submit-btn');
      const result = document.getElementById('bug-result');

      if (!title) { alert('Title is required'); return; }
      if (!getToken()) { alert('Sign in first'); return; }

      btn.textContent = 'Submitting...';
      btn.disabled = true;

      try {
        let screenshotUrl = '';

        // Upload screenshot if provided
        if (fileInput.files.length > 0) {
          const file = fileInput.files[0];
          const reader = new FileReader();
          const base64 = await new Promise((resolve) => {
            reader.onload = (e) => resolve(e.target.result.split(',')[1]);
            reader.readAsDataURL(file);
          });

          // Upload to repo as an issue attachment via a unique filename
          const timestamp = Date.now();
          const ext = file.name.split('.').pop() || 'png';
          const path = `Docs/screenshots/bug-${timestamp}.${ext}`;

          await api(`/repos/${OWNER}/${REPO}/contents/${path}`, {
            method: 'PUT',
            headers: { ...headers(), 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: `screenshot: bug report ${timestamp}`,
              content: base64
            })
          });

          screenshotUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${path}`;
        }

        // Build issue body
        let issueBody = body || 'No description provided.';
        if (priority) issueBody += `\n\n**Priority:** ${priority}`;
        if (screenshotUrl) issueBody += `\n\n**Screenshot:**\n![screenshot](${screenshotUrl})`;
        issueBody += `\n\n---\n*Filed via Drift Command Center*`;

        // Create labels array
        const labels = ['bug'];
        if (priority) labels.push(priority);

        // Create issue
        const issue = await api(`/repos/${OWNER}/${REPO}/issues`, {
          method: 'POST',
          headers: { ...headers(), 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: `Bug: ${title}`,
            body: issueBody,
            labels: labels
          })
        });

        result.innerHTML = `<div style="color:var(--green)">Bug filed: <a href="${issue.html_url}" target="_blank">#${issue.number} — ${title}</a></div>`;
        document.getElementById('bug-title').value = '';
        document.getElementById('bug-body').value = '';
        document.getElementById('bug-priority').value = '';
        fileInput.value = '';
        document.getElementById('screenshot-preview').innerHTML = '';

      } catch (e) {
        result.innerHTML = `<div style="color:var(--red)">Failed: ${e.message}</div>`;
      }

      btn.textContent = 'Submit Bug';
      btn.disabled = false;
    }

    // Load open issues
    async function loadIssues() {
      const el = document.getElementById('issues-list');
      try {
        const issues = await api(`/repos/${OWNER}/${REPO}/issues?state=open&labels=bug&per_page=30`);
        if (issues.length === 0) {
          el.innerHTML = '<div class="empty">No open bugs.</div>';
          return;
        }
        el.innerHTML = `<ul class="report-list">${issues.map(i => {
          const priority = i.labels.find(l => ['P0','P1','P2'].includes(l.name));
          const priorityBadge = priority
            ? `<span class="report-type" style="background:${priority.name === 'P0' ? 'rgba(248,81,73,0.15);color:var(--red)' : priority.name === 'P1' ? 'rgba(210,153,34,0.15);color:var(--yellow)' : 'rgba(139,148,158,0.15);color:var(--text-muted)'}">${priority.name}</span>`
            : '';
          const hasImage = i.body && i.body.includes('![');
          return `<li class="report-item" onclick="window.open('${i.html_url}','_blank')">
            <div>
              <span class="report-title">#${i.number} ${i.title}</span>
              ${priorityBadge}
              ${hasImage ? '<span class="badge">has screenshot</span>' : ''}
            </div>
            <span class="report-date">${new Date(i.created_at).toLocaleDateString()}</span>
          </li>`;
        }).join('')}</ul>`;
      } catch (e) {
        el.innerHTML = `<div class="empty">Failed to load issues: ${e.message}</div>`;
      }
    }

    // Load metrics
    async function loadMetrics() {
      const el = document.getElementById('metrics');
      const metrics = await getMetrics();
      if (!metrics) {
        // Fallback: try state.md
        try {
          const state = await getReportContent('Docs/state.md');
          const tests = state.match(/Tests:\*\*\s*(\d+)/)?.[1] || '?';
          const build = state.match(/Build\s+(\d+)/)?.[1] || '?';
          const foods = state.match(/Foods:\*\*\s*([\d,]+)/)?.[1] || '?';
          el.innerHTML = `
            <div class="metric"><span class="metric-value">${build}</span><span class="metric-label">Build</span></div>
            <div class="metric"><span class="metric-value">${tests}</span><span class="metric-label">Tests</span></div>
            <div class="metric"><span class="metric-value">${foods}</span><span class="metric-label">Foods</span></div>
          `;
        } catch { el.innerHTML = '<div class="metric"><span class="metric-label">Metrics unavailable</span></div>'; }
        return;
      }
      el.innerHTML = `
        <div class="metric"><span class="metric-value">${metrics.cycle}</span><span class="metric-label">Cycles</span></div>
        <div class="metric"><span class="metric-value">${metrics.build}</span><span class="metric-label">Build</span></div>
        <div class="metric"><span class="metric-value">${metrics.tests}</span><span class="metric-label">Tests</span></div>
        <div class="metric"><span class="metric-value">${metrics.coverage}%</span><span class="metric-label">Coverage</span></div>
        <div class="metric"><span class="metric-value">${metrics.foods}</span><span class="metric-label">Foods</span></div>
        <div class="metric"><span class="metric-value">${metrics.lastReview}</span><span class="metric-label">Last Review</span></div>
      `;
    }

    // Load reports
    async function loadReports() {
      const list = document.getElementById('report-list');
      const loading = document.getElementById('reports-loading');
      try {
        const reports = await listReports();
        // Get comment counts from PRs
        const prs = await api(`/repos/${OWNER}/${REPO}/pulls?labels=report&state=all&per_page=50`);
        const prCommentCounts = {};
        for (const pr of prs) {
          const comments = pr.review_comments || 0;
          // Map PR branch to report filename
          const branch = pr.head.ref;
          prCommentCounts[branch] = comments;
        }

        loading.style.display = 'none';
        if (reports.length === 0) {
          list.innerHTML = '<div class="empty">No reports yet. Start Drift Control to generate the first report.</div>';
          return;
        }
        list.innerHTML = reports.map(r => {
          const type = reportType(r.name);
          const date = formatDate(r.name);
          // Find comment count
          let branch = '';
          if (r.name.startsWith('review-cycle-')) branch = `review/cycle-${r.name.replace('review-cycle-','').replace('.md','')}`;
          else if (r.name.startsWith('exec-')) branch = `report/exec-${r.name.replace('exec-','').replace('.md','')}`;
          const comments = prCommentCounts[branch] || 0;

          return `<li class="report-item" onclick="location.href='report.html?file=${encodeURIComponent(r.name)}'">
            <div>
              <span class="report-title">${r.name.replace('.md','').replace(/-/g,' ')}</span>
              <span class="report-type ${type.cls}">${type.label}</span>
              ${comments > 0 ? `<span class="badge">${comments} comment${comments > 1 ? 's' : ''}</span>` : ''}
            </div>
            <span class="report-date">${date}</span>
          </li>`;
        }).join('');
      } catch (e) {
        loading.innerHTML = `<div class="empty">Failed to load reports. ${getToken() ? e.message : 'Sign in to view reports.'}</div>`;
      }
    }

    // Load feedback trail
    async function loadFeedback() {
      const el = document.getElementById('feedback-list');
      try {
        const prs = await api(`/repos/${OWNER}/${REPO}/pulls?labels=report&state=all&per_page=50`);
        let allComments = [];
        for (const pr of prs) {
          if (pr.review_comments === 0 && pr.comments === 0) continue;
          const comments = await getPRComments(pr.number);
          const issueComments = await api(`/repos/${OWNER}/${REPO}/issues/${pr.number}/comments`);
          allComments.push(...comments.map(c => ({ ...c, prTitle: pr.title, prNumber: pr.number })));
          allComments.push(...issueComments.map(c => ({ ...c, prTitle: pr.title, prNumber: pr.number, isIssueComment: true })));
        }

        if (allComments.length === 0) {
          el.innerHTML = '<div class="empty">No feedback yet. Open a report and comment on any line.</div>';
          return;
        }

        allComments.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        el.innerHTML = allComments.map(c => `
          <div class="feedback-item">
            <div class="comment-author">
              <img src="${c.user.avatar_url}" alt="${c.user.login}">
              <strong>${c.user.login}</strong>
              <time>${new Date(c.created_at).toLocaleDateString()}</time>
              <span style="color:var(--text-muted)">on ${c.prTitle}</span>
            </div>
            ${c.path ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">Line ${c.line || c.position} of ${c.path}</div>` : ''}
            <div class="comment-body">${renderMarkdown(c.body)}</div>
          </div>
        `).join('');
      } catch (e) {
        el.innerHTML = `<div class="empty">Failed to load feedback: ${e.message}</div>`;
      }
    }

    // Init
    showUser();
    loadMetrics();
    loadReports();
  </script>
</body>
</html>
