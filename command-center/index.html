<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drift Command Center</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h1><span>Drift</span> Command Center</h1>
    <div id="auth-area"></div>
  </div>

  <div class="metrics" id="metrics">
    <div class="loading"><span class="spinner"></span> Loading metrics...</div>
  </div>

  <div class="content">
    <div class="tabs">
      <div class="tab active" data-tab="reports">Reports</div>
      <div class="tab" data-tab="feedback">Feedback Trail</div>
    </div>

    <div id="tab-reports">
      <div class="loading" id="reports-loading"><span class="spinner"></span> Loading reports...</div>
      <ul class="report-list" id="report-list"></ul>
    </div>

    <div id="tab-feedback" style="display:none">
      <div id="feedback-list">
        <div class="loading"><span class="spinner"></span> Loading feedback...</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
  <script>
    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-reports').style.display = tab.dataset.tab === 'reports' ? '' : 'none';
        document.getElementById('tab-feedback').style.display = tab.dataset.tab === 'feedback' ? '' : 'none';
        if (tab.dataset.tab === 'feedback') loadFeedback();
      });
    });

    // Load metrics
    async function loadMetrics() {
      const el = document.getElementById('metrics');
      const metrics = await getMetrics();
      if (!metrics) {
        // Fallback: try state.md
        try {
          const state = await getReportContent('Docs/state.md');
          const tests = state.match(/Tests:\*\*\s*(\d+)/)?.[1] || '?';
          const build = state.match(/Build\s+(\d+)/)?.[1] || '?';
          const foods = state.match(/Foods:\*\*\s*([\d,]+)/)?.[1] || '?';
          el.innerHTML = `
            <div class="metric"><span class="metric-value">${build}</span><span class="metric-label">Build</span></div>
            <div class="metric"><span class="metric-value">${tests}</span><span class="metric-label">Tests</span></div>
            <div class="metric"><span class="metric-value">${foods}</span><span class="metric-label">Foods</span></div>
          `;
        } catch { el.innerHTML = '<div class="metric"><span class="metric-label">Metrics unavailable</span></div>'; }
        return;
      }
      el.innerHTML = `
        <div class="metric"><span class="metric-value">${metrics.cycle}</span><span class="metric-label">Cycles</span></div>
        <div class="metric"><span class="metric-value">${metrics.build}</span><span class="metric-label">Build</span></div>
        <div class="metric"><span class="metric-value">${metrics.tests}</span><span class="metric-label">Tests</span></div>
        <div class="metric"><span class="metric-value">${metrics.coverage}%</span><span class="metric-label">Coverage</span></div>
        <div class="metric"><span class="metric-value">${metrics.foods}</span><span class="metric-label">Foods</span></div>
        <div class="metric"><span class="metric-value">${metrics.lastReview}</span><span class="metric-label">Last Review</span></div>
      `;
    }

    // Load reports
    async function loadReports() {
      const list = document.getElementById('report-list');
      const loading = document.getElementById('reports-loading');
      try {
        const reports = await listReports();
        // Get comment counts from PRs
        const prs = await api(`/repos/${OWNER}/${REPO}/pulls?labels=report&state=all&per_page=50`);
        const prCommentCounts = {};
        for (const pr of prs) {
          const comments = pr.review_comments || 0;
          // Map PR branch to report filename
          const branch = pr.head.ref;
          prCommentCounts[branch] = comments;
        }

        loading.style.display = 'none';
        if (reports.length === 0) {
          list.innerHTML = '<div class="empty">No reports yet. Start Drift Control to generate the first report.</div>';
          return;
        }
        list.innerHTML = reports.map(r => {
          const type = reportType(r.name);
          const date = formatDate(r.name);
          // Find comment count
          let branch = '';
          if (r.name.startsWith('review-cycle-')) branch = `review/cycle-${r.name.replace('review-cycle-','').replace('.md','')}`;
          else if (r.name.startsWith('exec-')) branch = `report/exec-${r.name.replace('exec-','').replace('.md','')}`;
          const comments = prCommentCounts[branch] || 0;

          return `<li class="report-item" onclick="location.href='report.html?file=${encodeURIComponent(r.name)}'">
            <div>
              <span class="report-title">${r.name.replace('.md','').replace(/-/g,' ')}</span>
              <span class="report-type ${type.cls}">${type.label}</span>
              ${comments > 0 ? `<span class="badge">${comments} comment${comments > 1 ? 's' : ''}</span>` : ''}
            </div>
            <span class="report-date">${date}</span>
          </li>`;
        }).join('');
      } catch (e) {
        loading.innerHTML = `<div class="empty">Failed to load reports. ${getToken() ? e.message : 'Sign in to view reports.'}</div>`;
      }
    }

    // Load feedback trail
    async function loadFeedback() {
      const el = document.getElementById('feedback-list');
      try {
        const prs = await api(`/repos/${OWNER}/${REPO}/pulls?labels=report&state=all&per_page=50`);
        let allComments = [];
        for (const pr of prs) {
          if (pr.review_comments === 0 && pr.comments === 0) continue;
          const comments = await getPRComments(pr.number);
          const issueComments = await api(`/repos/${OWNER}/${REPO}/issues/${pr.number}/comments`);
          allComments.push(...comments.map(c => ({ ...c, prTitle: pr.title, prNumber: pr.number })));
          allComments.push(...issueComments.map(c => ({ ...c, prTitle: pr.title, prNumber: pr.number, isIssueComment: true })));
        }

        if (allComments.length === 0) {
          el.innerHTML = '<div class="empty">No feedback yet. Open a report and comment on any line.</div>';
          return;
        }

        allComments.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        el.innerHTML = allComments.map(c => `
          <div class="feedback-item">
            <div class="comment-author">
              <img src="${c.user.avatar_url}" alt="${c.user.login}">
              <strong>${c.user.login}</strong>
              <time>${new Date(c.created_at).toLocaleDateString()}</time>
              <span style="color:var(--text-muted)">on ${c.prTitle}</span>
            </div>
            ${c.path ? `<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">Line ${c.line || c.position} of ${c.path}</div>` : ''}
            <div class="comment-body">${renderMarkdown(c.body)}</div>
          </div>
        `).join('');
      } catch (e) {
        el.innerHTML = `<div class="empty">Failed to load feedback: ${e.message}</div>`;
      }
    }

    // Init
    showUser();
    loadMetrics();
    loadReports();
  </script>
</body>
</html>
