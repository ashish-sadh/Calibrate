<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signing in... — Drift Command Center</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h1><span>Drift</span> Command Center</h1>
  </div>
  <div class="content">
    <div class="loading" id="status"><span class="spinner"></span> Signing in with GitHub...</div>
  </div>

  <script src="app.js"></script>
  <script>
    (async () => {
      const params = new URLSearchParams(location.search);
      const code = params.get('code');
      const state = params.get('state');
      const el = document.getElementById('status');

      if (!code) {
        el.innerHTML = '<div class="empty">No authorization code received. <a href="index.html">Go back</a></div>';
        return;
      }

      // Verify state
      const savedState = localStorage.getItem('drift_oauth_state');
      if (state !== savedState) {
        el.innerHTML = '<div class="empty">State mismatch — possible CSRF. <a href="index.html">Try again</a></div>';
        return;
      }
      localStorage.removeItem('drift_oauth_state');

      try {
        await exchangeCode(code);
        el.innerHTML = '<div class="empty">Signed in! Redirecting...</div>';
        setTimeout(() => location.href = 'index.html', 500);
      } catch (e) {
        el.innerHTML = `<div class="empty">Sign in failed: ${e.message}. <a href="index.html">Try again</a></div>`;
      }
    })();
  </script>
</body>
</html>
